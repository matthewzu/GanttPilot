name: Auto Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        name: GanttPilot ${{ github.ref_name }}
        body: |
          ## GanttPilot ${{ github.ref_name }}

          基于甘特图的协作式项目管理器 / Collaborative Project Manager with Gantt Chart

          ### 📥 下载 / Download

          | 平台 / Platform | 文件 / File | 使用方式 / Usage |
          | --- | --- | --- |
          | Windows | `GanttPilot.exe` | 双击运行 / Double-click to run |
          | macOS | `GanttPilot.dmg` | 打开 DMG 运行 / Open DMG |
          | Linux | `GanttPilot` | `chmod +x GanttPilot && ./GanttPilot` |

          CLI 模式 / CLI mode: `GanttPilot --cli`

          ### 🏗️ 核心能力 / Core Capabilities

          **项目管理 / Project Management**
          - 需求分析 → 任务拆解 → 里程碑规划 → 计划执行 → 活动记录，覆盖项目全生命周期
          - Full lifecycle: Requirements → Tasks → Milestones → Plans → Activities

          **甘特图 / Gantt Chart**
          - 原生 Canvas 渲染，按执行者着色，进度条，里程碑菱形标记，跳过日期红色斜线
          - Native rendering, per-executor coloring, progress bars, milestone markers, skip-date hatching

          **需求跟踪 / Requirement Tracking**
          - 计划关联任务，形成需求→任务→计划→进度完整跟踪链
          - Link plans to tasks for full requirement → task → plan → progress traceability

          **工时管理 / Time Tracking**
          - 时间段（0900/1200,1400/1700）或直接填写小时数，按项目/里程碑/计划/标签四维统计
          - Time slots or direct hours, 4 view modes: by project/milestone/plan/tag

          **Git 协作 / Git Collaboration**
          - 每项目独立 Git 仓库，私有分支 + PR 工作流，后台自动检测远端更新
          - Per-project Git repos, private branches + PR workflow, background update detection

          **报告 / Reports**
          - Markdown 报告内嵌 PNG 甘特图，含需求分析、进度详情、工时明细
          - Markdown reports with embedded PNG Gantt chart, requirement analysis, progress details

          **效率工具 / Productivity**
          - 键盘快捷键（可自定义）、复制/粘贴/克隆、撤销/恢复、中英文双语
          - Customizable shortcuts, copy/paste/duplicate, undo/redo, bilingual (EN/ZH)

          📖 详细文档 / Documentation: [README.md](https://github.com/${{ github.repository }})
        draft: false
        prerelease: false

  build-windows:
    needs: create-release
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    - run: |
        pip install pyinstaller Pillow
        pyinstaller --onefile --windowed --name=GanttPilot --icon=ganttpilot.ico --add-data "ganttpilot.ico;." --add-data "examples;examples" --hidden-import PIL main.py
    - uses: softprops/action-gh-release@v1
      with:
        files: dist/GanttPilot.exe

  build-macos:
    needs: create-release
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    - run: |
        pip install pyinstaller Pillow
        pyinstaller --onefile --windowed --name=GanttPilot --add-data "ganttpilot.ico:." --add-data "examples:examples" --hidden-import PIL main.py
        mkdir dmg_temp
        cp dist/GanttPilot dmg_temp/
        hdiutil create -volname "GanttPilot" -srcfolder dmg_temp -ov -format UDZO GanttPilot.dmg
    - uses: softprops/action-gh-release@v1
      with:
        files: GanttPilot.dmg

  build-linux:
    needs: create-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    - run: |
        pip install pyinstaller Pillow
        pyinstaller --onefile --windowed --name=GanttPilot --icon=ganttpilot.ico --add-data "ganttpilot.ico:." --add-data "examples:examples" --hidden-import PIL main.py
    - uses: softprops/action-gh-release@v1
      with:
        files: dist/GanttPilot
